<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>R2 录播下载器</title>
		<link rel="stylesheet" href="/styles.css" />
	</head>
	<body>
		<div class="shell">
			<header class="topbar">
				<div>
					<h1>R2 录播下载器</h1>
					<p id="remoteLabel">连接 R2 中...</p>
				</div>
				<div class="top-actions">
					<button id="refreshButton" class="button secondary" type="button">刷新列表</button>
					<button id="motrixButton" class="button secondary" type="button" disabled>发送到 Motrix</button>
					<button id="downloadButton" class="button primary" type="button" disabled>下载选中</button>
				</div>
			</header>

			<section class="controls">
				<label class="field wide">
					<span>下载到本机目录</span>
					<input id="destinationInput" autocomplete="off" />
				</label>
				<button id="openFolderButton" class="button secondary" type="button">打开目录</button>
				<label class="field search">
					<span>搜索</span>
					<input id="searchInput" placeholder="主播、日期、文件名" autocomplete="off" />
				</label>
			</section>

			<main class="content">
				<aside class="sidebar">
					<div class="sidebar-title">目录</div>
					<div id="groupList" class="group-list"></div>
				</aside>

				<section class="table-panel">
					<div class="table-header">
						<label class="select-all">
							<input id="selectAllInput" type="checkbox" />
							<span id="summaryLabel">0 个文件</span>
						</label>
						<button id="clearSelectionButton" class="text-button" type="button">清空选择</button>
					</div>
					<div class="table-wrap">
						<table>
							<thead>
								<tr>
									<th class="check-cell"></th>
									<th>文件</th>
									<th>主播</th>
									<th>日期</th>
									<th class="size-cell">大小</th>
									<th class="time-cell">更新时间</th>
								</tr>
							</thead>
							<tbody id="fileTable"></tbody>
						</table>
					</div>
				</section>
			</main>

			<section class="log-panel">
				<div class="log-header">
					<span id="jobLabel">等待下载任务</span>
					<button id="cancelButton" class="text-button danger" type="button" disabled>取消任务</button>
				</div>
				<pre id="logOutput"></pre>
			</section>
		</div>

		<script src="/app.js"></script>
	</body>
</html>
